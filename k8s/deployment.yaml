apiVersion: apps/v1
kind: Deployment
metadata:
  name: find-my-hobby-api
  labels:
    app: find-my-hobby-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: find-my-hobby-api
  template:
    metadata:
      labels:
        app: find-my-hobby-api
    spec:
      containers:
        - name: find-my-hobby-api
          image: find-my-hobby-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
