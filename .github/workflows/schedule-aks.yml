name: Schedule AKS

on:
  schedule:
    # Stop at 18:00 UTC Monday-Friday.
    # Note: GitHub Actions cron uses UTC.
    - cron: "0 18 * * 1-5"

    # Ensure the cluster is stopped on Saturday morning.
    - cron: "0 1 * * 6"

    # Ensure the cluster is stopped on Sunday morning.
    - cron: "0 1 * * 0"

  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "status"
        type: choice
        options:
          - start
          - stop
          - status

permissions:
  id-token: write
  contents: read

jobs:
  schedule-aks:
    name: Schedule AKS
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Decide action
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "action=stop" >> "$GITHUB_OUTPUT"

      - name: Get AKS status
        id: aks-status
        shell: bash
        run: |
          POWER_STATE=$(az aks show \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --query "powerState.code" \
            --output tsv)

          PROVISIONING_STATE=$(az aks show \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --query "provisioningState" \
            --output tsv)

          echo "power_state=$POWER_STATE" >> "$GITHUB_OUTPUT"
          echo "provisioning_state=$PROVISIONING_STATE" >> "$GITHUB_OUTPUT"

          echo "AKS power state: $POWER_STATE"
          echo "AKS provisioning state: $PROVISIONING_STATE"

      - name: Stop AKS
        if: steps.decide.outputs.action == 'stop' && steps.aks-status.outputs.power_state == 'Running'
        run: |
          az aks stop \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Skip stop because AKS is already stopped
        if: steps.decide.outputs.action == 'stop' && steps.aks-status.outputs.power_state != 'Running'
        run: |
          echo "AKS is not running. Current state: ${{ steps.aks-status.outputs.power_state }}. Nothing to stop."

      - name: Start AKS
        if: steps.decide.outputs.action == 'start' && steps.aks-status.outputs.power_state != 'Running'
        run: |
          az aks start \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Skip start because AKS is already running
        if: steps.decide.outputs.action == 'start' && steps.aks-status.outputs.power_state == 'Running'
        run: |
          echo "AKS is already running. Nothing to start."

      - name: Show AKS status
        if: steps.decide.outputs.action == 'status'
        run: |
          az aks show \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --query "{name:name, powerState:powerState.code, provisioningState:provisioningState}" \
            --output table