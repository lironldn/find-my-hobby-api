name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: find-my-hobby-api
  K8S_DEPLOYMENT_NAME: find-my-hobby-api
  K8S_CONTAINER_NAME: find-my-hobby-api
  K8S_NAMESPACE: default

jobs:
  build-publish-deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: |
          az acr login \
            --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f k8s/deployment.yaml

          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f k8s/service.yaml

      - name: Update deployment image
        run: |
          kubectl set image \
            deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            ${{ env.K8S_CONTAINER_NAME }}=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status \
            deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            --namespace ${{ env.K8S_NAMESPACE }}