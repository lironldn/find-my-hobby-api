name: Build, Publish, and Deploy API and Website to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write

env:
  IMAGE_NAME: find-my-hobby-api
  IMAGE_NAME_WEB: find-my-hobby-web
  K8S_DEPLOYMENT_NAME: find-my-hobby-api
  K8S_CONTAINER_NAME: find-my-hobby-api
  K8S_WEB_DEPLOYMENT_NAME: find-my-hobby-web
  K8S_WEB_CONTAINER_NAME: find-my-hobby-web
  K8S_NAMESPACE: default

jobs:
  build-and-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: |
          az acr login \
            --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  build-and-publish-web:
    name: Build and publish website image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: |
          az acr login \
            --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push website image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./FindMyHobbyWeb
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_WEB }}:latest

  deploy-and-test:
    name: Deploy to AKS and run acceptance tests
    runs-on: ubuntu-latest
    environment: aks
    needs: build-and-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f k8s/deployment.yaml

          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f k8s/service.yaml

      - name: Update deployment image
        run: |
          kubectl set image \
            deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            ${{ env.K8S_CONTAINER_NAME }}=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status \
            deployment/${{ env.K8S_DEPLOYMENT_NAME }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for service external IP
        shell: bash
        run: |
          for i in {1..30}; do
            EXTERNAL_IP=$(kubectl get service ${{ env.K8S_DEPLOYMENT_NAME }} \
              --namespace ${{ env.K8S_NAMESPACE }} \
              --output jsonpath='{.status.loadBalancer.ingress[0].ip}')

            if [ -n "$EXTERNAL_IP" ]; then
              echo "External IP: $EXTERNAL_IP"
              echo "FIND_MY_HOBBY_API_BASE_URL=http://$EXTERNAL_IP" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "Waiting for external IP..."
            sleep 10
          done

          echo "Timed out waiting for external IP"
          exit 1

      - name: Run acceptance tests
        run: |
          echo "Running acceptance tests against: $FIND_MY_HOBBY_API_BASE_URL"

          dotnet test FindMyHobbyApi.AcceptanceTests/FindMyHobbyApi.AcceptanceTests.csproj \
            --configuration Release \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=acceptance-tests.trx" \
            --results-directory TestResults

      - name: Upload acceptance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-results
          path: TestResults

      - name: Publish acceptance test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Acceptance Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

  deploy-web:
    name: Deploy website to AKS
    runs-on: ubuntu-latest
    needs:
      - deploy-and-test
      - build-and-publish-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy website manifests
        run: |
          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f FindMyHobbyWeb/k8s/deployment.yaml

          kubectl apply \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -f FindMyHobbyWeb/k8s/service.yaml

      - name: Update website deployment image
        run: |
          kubectl set image \
            deployment/${{ env.K8S_WEB_DEPLOYMENT_NAME }} \
            ${{ env.K8S_WEB_CONTAINER_NAME }}=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_WEB }}:${{ env.IMAGE_TAG }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for website rollout
        run: |
          kubectl rollout status \
            deployment/${{ env.K8S_WEB_DEPLOYMENT_NAME }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for website external IP
        shell: bash
        run: |
          for i in {1..30}; do
            EXTERNAL_IP=$(kubectl get service ${{ env.K8S_WEB_DEPLOYMENT_NAME }} \
              --namespace ${{ env.K8S_NAMESPACE }} \
              --output jsonpath='{.status.loadBalancer.ingress[0].ip}')

            if [ -n "$EXTERNAL_IP" ]; then
              echo "Website external IP: $EXTERNAL_IP"
              exit 0
            fi

            echo "Waiting for website external IP..."
            sleep 10
          done

          echo "Timed out waiting for website external IP"
          exit 1
